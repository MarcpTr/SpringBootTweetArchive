<li th:fragment="collectionCard(collection)"
    class="bg-white p-5 rounded-xl shadow hover:shadow-xl hover:scale-[1.02] transition cursor-pointer relative"
    th:onclick="|window.location.href='@{/collection/{id}(id=${collection.collectionId})}'|">

    <!-- Nombre de la colección -->
    <h2 class="text-lg font-bold" th:text="${collection.collectionName}"></h2>

    <!-- Span clicable para ir al perfil del usuario -->
    <span class="text-sm text-gray-500 hover:text-sky-400 cursor-pointer" th:text="'by: ' + ${collection.username}"
        th:onclick="|event.stopPropagation(); window.location.href='@{/user/{username}(username=${collection.username})}'|">
    </span>

    <!-- Botones fuera del enlace -->
    <div class="mt-2 flex gap-2">
        <button type="button" th:id="'delete-' + ${collection.collectionId}"
            th:attr="data-id=${collection.collectionId}"
            onclick="event.stopPropagation(); deleteCollection(this.dataset.id)"
            class="text-red-500 hover:text-red-700">

            <i class="fas fa-trash"></i>
        </button>
        <button type="button" th:id="'btn-' + ${collection.collectionId}"
            onclick="event.stopPropagation(); toggleVisibility(this.dataset.id)"
            th:attr="data-id=${collection.collectionId}" class="text-blue-500 hover:text-blue-700">

            <i class="fas" th:classappend="${collection.isPublic} ? 'fa-eye' : 'fa-eye-slash'">
            </i>

        </button>
    </div>

    <!-- Preview del tweet -->
    <div class="mt-4 h-32 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden relative">
        <div class="tweet-wrapper relative w-full h-full" th:if="${collection.previewTweet != null}">
            <blockquote class="twitter-tweet">
                <a
                    th:href="'https://twitter.com/user/status/' + ${collection.previewTweet.substring(collection.previewTweet.lastIndexOf('/') + 1)}">
                    Loading preview
                </a>
            </blockquote>
            <!-- Overlay que bloquea interacción del iframe y redirige a la colección -->
            <div class="absolute inset-0 z-20 cursor-pointer"
                th:onclick="|window.location.href='@{/collection/{id}(id=${collection.collectionId})}'|">
            </div>
        </div>
        <span th:if="${collection.previewTweet == null}" class="text-gray-400 text-sm">
            No preview
        </span>
    </div>

    <div class="mt-4 flex justify-between text-xs text-gray-400">
        <span th:text="${collection.tweetCount} + ' tweets'"></span>
        <span>#dev</span>
    </div>
</li>
