<aside th:fragment="navbar"
  class="fixed bottom-0 left-0 w-full sm:top-0 sm:bottom-auto sm:w-20 2xl:w-64 h-auto sm:h-screen bg-white border-t sm:border-t-0 sm:border-r z-50">

<nav class="flex sm:flex-col items-center justify-center sm:items-stretch sm:justify-start gap-3 sm:gap-4 p-3">
    <a th:href="@{/}" th:classappend="${active == 'home'} ? 'font-semibold bg-blue-50'"
      class="flex items-center gap-3 px-3 py-2 rounded-lg sm:w-full sm:justify-center 2xl:justify-start hover:bg-blue-100 transition shrink-0"
      aria-label="Home" title="Home">
      <i class="fas fa-home text-xl"></i>
      <span class="hidden 2xl:inline">Home</span>
    </a>

    <a th:href="@{/dashboard}" th:classappend="${active == 'dashboard'} ? 'font-semibold bg-blue-50'"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 sm:w-full sm:justify-center 2xl:justify-start hover:text-blue-500 hover:bg-blue-50 transition shrink-0"
      aria-label="Dashboard" title="Dashboard">
      <i class="fas fa-folder text-xl"></i>
      <span class="hidden 2xl:inline">Dashboard</span>
    </a>

    <a th:href="@{/collection/create}" th:classappend="${active == 'createCollection'} ? 'font-semibold bg-blue-50'"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 sm:w-full sm:justify-center 2xl:justify-start hover:text-blue-500 hover:bg-blue-50 transition shrink-0"
      aria-label="Create collection" title="Create">
      <i class="fas fa-plus text-xl"></i>
      <span class="hidden 2xl:inline">Create</span>
    </a>

    <a th:href="@{/login}" th:if="${#authentication.principal == 'anonymousUser'}"
      th:classappend="${active == 'login'} ? 'font-semibold bg-blue-50'"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 sm:w-full sm:justify-center 2xl:justify-start hover:text-blue-500 hover:bg-blue-50 transition shrink-0"
      aria-label="Login" title="Login">
      <i class="fas fa-users text-xl"></i>
      <span class="hidden 2xl:inline">Login</span>
    </a>

    <a th:href="@{/register}" th:if="${#authentication.principal == 'anonymousUser'}"
      th:classappend="${active == 'register'} ? 'font-semibold bg-blue-50'"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 sm:w-full sm:justify-center 2xl:justify-start hover:text-blue-500 hover:bg-blue-50 transition shrink-0"
      aria-label="Register" title="Register">
      <i class="fas fa-sign-in text-xl"></i>
      <span class="hidden 2xl:inline">Register</span>
    </a>

    <form th:action="@{/logout}" method="post" th:if="${#authentication.principal != 'anonymousUser'}">
      <button type="submit"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 sm:w-full sm:justify-center 2xl:justify-start hover:text-blue-500 hover:bg-blue-50 transition shrink-0">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <i class="fas fa-sign-out-alt text-xl"></i>
        <span class="hidden 2xl:inline">Logout</span>
      </button>
    </form>

  </nav>
</aside>
