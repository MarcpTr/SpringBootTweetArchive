    <meta charset="UTF-8">
    <title>My Collections</title>

<body class="bg-gray-50 text-gray-900 flex flex-col sm:flex-row">
    <div th:replace="fragments :: navbar"></div>
    <main class="h-screen  flex flex-col w-full p-8 space-y-4 sm:h-screen sm:overflow-y-auto">
        <h1 class="text-4xl font-extrabold text-gray-900 md:text-5xl"
            th:if="${#authentication.principal != 'anonymousUser'}"><span th:text="${#authentication.name}"></span>'s
            Collections</h1>
        <p id="error-message" style="color: red; display: none;">The entered URL is invalid.</p>
        <p id="success-message" style="color: green; display: none;"></p>

        <ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <li th:if="${collections != null and !#lists.isEmpty(collections)}" th:each="collection : ${collections}"
                class="bg-white p-5 rounded-xl shadow hover:shadow-xl hover:scale-[1.02] transition cursor-pointer">
                <div class="flex row justify-between">
                    <div>
                        <h2 class="text-lg font-bold" th:text="${collection.name}"></h2>
                        <span class="text-sm text-gray-500" th:text="'by: ' + ${collection.user.username}"
                            th:onclick="|window.location.href='@{/user/{id}(id=${collection.user.id})}'|">
                        </span>
                    </div>
                    <div><button onClick="removeCollection(this.id)" th:id="${collection.id}"
                            class=" group-hover:opacity-100 transition text-red-500 hover:text-red-700">
                            <i class="fas fa-trash"></i>
                        </button>
                        <button onClick="changeVisibility(this.id)" th:id="${collection.id}"
                            class="group-hover:opacity-100 transition text-blue-500 hover:text-blue-700"><i
                                class="fas  2xl:mr-4"
                                th:classappend="${collection.isPublic ? 'fa-eye' : 'fa-eye-slash'} "></i></button>
                    </div>
                </div>
                <a th:href="@{/collection/{id}(id=${collection.id})}">

                    <div class="mt-4 h-32 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden">

                        <div class="tweet-wrapper relative"
                            th:if="${!#lists.isEmpty(collection.tweets) and collection.tweets[0].tweet != null}">
                            <blockquote class="twitter-tweet">
                                <a
                                    th:href="'https://twitter.com/user/status/' + ${collection.tweets[0].tweet.substring(collection.tweets[0].tweet.lastIndexOf('/') + 1)}">
                                    Loading preview
                                </a>
                            </blockquote>
                            <!-- Overlay invisible -->
                            <a th:href="@{/collection/{id}(id=${collection.id})}" class="absolute inset-0 z-10"></a>
                        </div>
                        <span th:if="${#lists.isEmpty(collection.tweets) or collection.tweets[0].tweet == null}"
                            class="text-gray-400 text-sm">
                            No preview
                        </span>
                    </div>
                    <div class="mt-4 flex justify-between text-xs text-gray-400">
                        <span th:text="${#lists.size(collection.tweets)} + ' tweets'"></span>
                        <span>#dev</span>
                    </div>
                </a>
            </li>

        </ul>
    </main>
    <script>
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        function removeCollection(collectionId) {
            const urlEndpoint = "/collection/" + collectionId + "/remove-collection";

            fetch(urlEndpoint, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        successMessage.textContent = data.message;
                        successMessage.style.display = 'block';
                        location.reload(true);
                    } else {
                        errorMessage.textContent = data.message;
                        errorMessage.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Error while sending the URL:', error);
                    errorMessage.textContent = "There was an unexpected error while processing the application.";
                    errorMessage.style.display = 'block';
                });
        }
        function changeVisibility(collectionId) {
            const urlEndpoint = "/collection/" + collectionId + "/change-visibility";

            fetch(urlEndpoint, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        successMessage.textContent = data.message;
                        successMessage.style.display = 'block';
                        location.reload(true);
                    } else {
                        errorMessage.textContent = data.message;
                        errorMessage.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Error while sending the URL:', error);
                    errorMessage.textContent = "There was an unexpected error while processing the application.";
                    errorMessage.style.display = 'block';
                });
        }
    </script>
