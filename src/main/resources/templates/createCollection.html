<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="UTF-8">
  <title>Create Collection</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script defer src="https://analytics.marcpericot.es/script.js"
    data-website-id="0624f2fd-d168-4148-a9e6-55cf35f47416"></script><meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="bg-gray-50 text-gray-900 flex flex-col sm:flex-row min-h-screen">

  <!-- Navbar -->
  <div th:replace="fragments/navbar.html  :: navbar"></div>

  <main class="h-screen flex justify-center items-center w-full p-6 sm:overflow-y-auto">

    <form th:action="@{/collection/create}"
          th:object="${createCollectionForm}"
          method="post"
          class="flex flex-col items-center space-y-6 p-8 max-w-md mx-auto bg-white shadow-2xl rounded-3xl border border-gray-200">

      <h2 class="text-3xl font-extrabold text-gray-800 mb-4">
        Create Collection
      </h2>

      <!-- GLOBAL ERRORS -->
      <div th:if="${#fields.hasGlobalErrors()}"
           class="w-full text-red-600 text-sm text-center space-y-1">

        <p th:each="err : ${#fields.globalErrors()}"
           th:text="${err}">
        </p>

      </div>

      <!-- COLLECTION NAME -->
      <div class="w-full">
        <label for="collectionName"
               class="block text-sm font-medium text-gray-700 mb-2">
          Collection Name
        </label>

        <input type="text"
               id="collectionName"
               th:field="*{collectionName}"
               placeholder="Enter collection name"
               class="w-full p-4 border border-gray-300 rounded-xl shadow-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />

        <!-- FIELD ERROR -->
        <p th:if="${#fields.hasErrors('collectionName')}"
           th:errors="*{collectionName}"
           class="text-red-600 text-sm mt-2">
        </p>
      </div>

      <!-- PUBLIC CHECKBOX -->
      <div class="w-full flex items-center space-x-3">

        <input type="checkbox"
               id="publicCollection"
               th:field="*{publicCollection}"
               class="h-5 w-5 text-blue-600 focus:ring-blue-500 rounded" />

        <label for="publicCollection"
               class="text-sm text-gray-700">
          Make this collection public
        </label>

      </div>

      <!-- SUBMIT BUTTON -->
      <button type="submit"
              class="w-full py-3 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold rounded-xl shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-200">

        Create Collection
      </button>

    </form>

  </main>

</body>

</html>
