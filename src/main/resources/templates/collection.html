<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:c="http://www.w3.org/1999/XSL/Transform">

<head>
    <meta charset="UTF-8">
    <title th:text="'Collection: ' + ${collection.name}"></title>
    <script src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="https://analytics.marcpericot.es/script.js"
        data-website-id="0624f2fd-d168-4148-a9e6-55cf35f47416"></script>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="bg-gray-50 text-gray-900 flex flex-col sm:flex-row min-h-screen">
    <div th:replace="fragments/navbar.html :: navbar"></div>
    <main class="flex-1 p-6 sm:p-10">

        <div class="max-w-3xl mx-auto space-y-8">

            <!-- Header -->
            <!-- <div class="space-y-2">
                <h1 class="text-3xl font-bold" th:text="${collection.name}"></h1>

                <div class="flex items-center gap-2 text-sm text-gray-500 flex-wrap">
                    <span>by</span>

                    <a th:href="@{/user/{username}(username=${collection.username})}" th:text="${collection.username}"
                        class="text-blue-500 hover:underline font-medium"></a>

                    <span>·</span>

                    <span th:text="${#lists.size(collection.tweets)} + ' tweets'"></span>

                    <button
                        class="like-btn flex items-center gap-1 ml-2 px-2 py-1 rounded-md hover:bg-gray-100 transition"
                        th:classappend="${collection.likedByCurrentUser} ? 'liked'"
                        th:onclick="|event.stopPropagation(); toggleLike(${collection.id}, this);|">

                        <span class="like-icon" th:text="${collection.likedByCurrentUser} ? '❤️' : '🤍'"></span>

                        <span class="like-count" th:text="${collection.likesCount}"></span>
                    </button>
                </div>
            </div> -->
            <div>
                <h1 class="text-3xl font-semibold" th:text="${collection.name}"></h1>

                <div class="flex items-center gap-3 text-sm text-gray-500 mt-2">

                    <a th:href="@{/user/{username}(username=${collection.username})}" class="hover:text-blue-500"
                        th:text="'@' + ${collection.username}">
                    </a>

                    <span>•</span>

                    <span th:text="${#lists.size(collection.tweets)} + ' tweets'"></span>

                    <!-- Like -->
                    <button class="like-btn ml-2 px-3 py-1 rounded-full border hover:bg-gray-100 transition"
                        th:classappend="${collection.likedByCurrentUser} ? 'liked'"
                        th:onclick="|event.stopPropagation(); toggleLike(${collection.id}, this);|">

                        <span class="like-icon" th:text="${collection.likedByCurrentUser} ? '❤️' : '🤍'"></span>
                        <span class="like-count" th:text="${collection.likesCount}"></span>
                    </button>
                </div>
            </div>

            <form th:if="${isCreator}" th:action="@{/collection/{id}/add-tweet(id=${collection.id})}" method="post"
                th:object="${form}" class="flex flex-col gap-2 bg-white p-3 rounded-xl border">

                <div class="flex gap-2">
                    <input type="text" th:field="*{tweetLink}" placeholder="Paste tweet URL..."
                        class="flex-1 px-3 py-2 rounded-lg outline-none focus:ring-2 focus:ring-black">

                    <button class="bg-black text-white px-4 rounded-lg">
                        Add
                    </button>
                </div>

                <p th:if="${#fields.hasErrors('tweetLink')}" th:errors="*{tweetLink}"
                    class="text-red-500 text-sm w-full"></p>

                <p th:if="${successMessage}" th:text="${successMessage}" class="text-green-500 text-sm w-full"></p>

            </form>
            <!-- Tweets -->
            <ul class="space-y-6">

                <li th:each="tweet : ${collection.tweets}" class="bg-white p-4 rounded-xl shadow relative group">

                    <button th:if="${isCreator}" th:onclick="|removeTweet(${collection.id}, ${tweet.id}, this)|"
                        class="absolute top-2 right-2 group-hover:opacity-100 tranition text-red-500 hover:text-red-700">
                        <i class="fas fa-trash"></i>
                    </button>

                    <div class="overflow-hidden rounded-lg">
                        <blockquote class="twitter-tweet">
                            <a
                                th:href="'https://twitter.com/user/status/' + ${tweet.tweet.substring(tweet.tweet.lastIndexOf('/') + 1)}">
                                Loading tweet
                            </a>
                        </blockquote>
                    </div>

                </li>

                <li th:if="${collection.tweets == null or #lists.isEmpty(collection.tweets)}"
                    class="text-center text-gray-400">
                    No tweets available
                </li>

            </ul>

        </div>
    </main>
    <script>
        function removeTweet(collectionId, tweetId, button) {
            if (!confirm("¿Seguro que quieres eliminar este tweet?")) {
                return;
            }

            const urlEndpoint = `/api/collection/${collectionId}/tweets/${tweetId}`;

            fetch(urlEndpoint, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                }
            })
                .then(async response => {

                    if (response.status === 204) {
                        button.closest("li").remove();
                        return;
                    }

                    let errorData;
                    try {
                        errorData = await response.json();
                    } catch (e) {
                        throw new Error("Error inesperado del servidor");
                    }

                    const message = errorData?.error?.message || "Error al eliminar";
                    throw new Error(message);
                })
                .catch(error => {
                    console.error(error);
                    alert(error.message);
                });
        }
    </script>
    <script type="text/javascript" th:src="@{/js/csrf.js}"></script>
    <script type="text/javascript" th:src="@{/js/likes.js}"></script>
</body>

</html>
