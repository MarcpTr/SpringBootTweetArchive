<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script defer src="https://analytics.marcpericot.es/script.js"
    data-website-id="0624f2fd-d168-4148-a9e6-55cf35f47416"></script><meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="bg-gray-50 text-gray-900 flex flex-col sm:flex-row min-h-screen">

  <!-- Navbar -->
  <div th:replace="fragments/navbar.html  :: navbar"></div>

  <main class="h-screen flex justify-center items-center w-full p-6 sm:overflow-y-auto">

    <form th:action="@{/register}"  th:object="${registerRequest}" method="post"
      class="flex flex-col items-center space-y-6 p-10 max-w-md mx-auto bg-white shadow-2xl rounded-3xl border border-gray-200">

      <h2 class="text-3xl font-extrabold text-gray-800 mb-6">Register</h2>

      <!-- Username -->
      <div class="w-full">
        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input type="text" id="username" th:field="*{username}" placeholder="Choose a username"
          class="w-full p-4 border border-gray-300 rounded-xl shadow-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition"
          required autofocus />
        <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
        </div>
      </div>

   <!-- Email -->
      <div class="w-full">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="text" id="email" th:field="*{email}" placeholder="example@email.com"
          class="w-full p-4 border border-gray-300 rounded-xl shadow-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition"
          required autofocus />
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
        </div>
      </div>


      <!-- Password -->
      <div class="w-full">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" id="password" th:field="*{password}" placeholder="Create a password"
          class="w-full p-4 border border-gray-300 rounded-xl shadow-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition"
          required />
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
        </div>

         <!-- Submit -->
        <button type="submit"
          class="w-full py-3 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-semibold rounded-xl shadow-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50 transition duration-200">
          Create Account
        </button>

        <!-- Error message -->
        <div th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}">
        </div>
        <!-- Link to login -->
        <p class="text-sm text-gray-500 mt-4 text-center">
          Already have an account?
          <a href="/login" class="text-blue-600 font-medium hover:underline">Login</a>
        </p>

    </form>

  </main>
</body>

</html>
