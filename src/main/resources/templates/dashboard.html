<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>My Collections</title>
    <script src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="https://analytics.marcpericot.es/script.js"
        data-website-id="0624f2fd-d168-4148-a9e6-55cf35f47416"></script>

</head>

<body class="bg-gray-50 text-gray-900 flex flex-col sm:flex-row">
    <div th:replace="fragments/navbar.html  :: navbar"></div>
    <main class="h-screen  flex flex-col w-full p-8 space-y-4 sm:h-screen sm:overflow-y-auto">
        <h1 class="text-4xl font-extrabold text-gray-900 md:text-5xl"
            th:if="${#authentication.principal != 'anonymousUser'}"><span th:text="${#authentication.name}"></span>'s
            Dashboard</h1>
        <p id="error-message" style="color: red; display: none;">The entered URL is invalid.</p>
        <p id="success-message" style="color: green; display: none;"></p>

        <ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <li th:if="${collections != null and !#lists.isEmpty(collections)}" th:each="collection : ${collections}"
                class="bg-white p-5 rounded-xl shadow hover:shadow-xl hover:scale-[1.02] transition cursor-pointer relative"
                th:onclick="|window.location.href='@{/collection/{id}(id=${collection.collectionId})}'|">

                <!-- Nombre de la colección -->
                <h2 class="text-lg font-bold" th:text="${collection.collectionName}"></h2>

                <!-- Span clicable para ir al perfil del usuario -->
                <span class="text-sm text-gray-500 hover:text-sky-400 cursor-pointer"
                    th:text="'by: ' + ${collection.username}"
                    th:onclick="|event.stopPropagation(); window.location.href='@{/user/{username}(username=${collection.username})}'|">
                </span>

                <!-- Botones fuera del enlace -->
                <div class="mt-2 flex gap-2">
                    <button type="button" th:id="'delete-' + ${collection.collectionId}"
                        th:attr="data-id=${collection.collectionId}"
                        onclick="event.stopPropagation(); deleteCollection(this.dataset.id)"
                        class="text-red-500 hover:text-red-700">

                        <i class="fas fa-trash"></i>
                    </button>
                    <button type="button" th:id="'btn-' + ${collection.collectionId}"
                        onclick="event.stopPropagation(); toggleVisibility(this.dataset.id)"
                        th:attr="data-id=${collection.collectionId}" class="text-blue-500 hover:text-blue-700">

                        <i class="fas" th:classappend="${collection.isPublic} ? 'fa-eye' : 'fa-eye-slash'">
                        </i>

                    </button>
                </div>

                <!-- Preview del tweet -->
                <div class="mt-4 h-32 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden relative">
                    <div class="tweet-wrapper relative w-full h-full" th:if="${collection.previewTweet != null}">
                        <blockquote class="twitter-tweet">
                            <a
                                th:href="'https://twitter.com/user/status/' + ${collection.previewTweet.substring(collection.previewTweet.lastIndexOf('/') + 1)}">
                                Loading preview
                            </a>
                        </blockquote>
                        <!-- Overlay que bloquea interacción del iframe y redirige a la colección -->
                        <div class="absolute inset-0 z-20 cursor-pointer"
                            th:onclick="|window.location.href='@{/collection/{id}(id=${collection.collectionId})}'|">
                        </div>
                    </div>
                    <span th:if="${collection.previewTweet == null}" class="text-gray-400 text-sm">
                        No preview
                    </span>
                </div>

                <div class="mt-4 flex justify-between text-xs text-gray-400">
                    <span th:text="${collection.tweetCount} + ' tweets'"></span>
                    <span>#dev</span>
                </div>
            </li>
        </ul>
    </main>
      <script th:inline="javascript">
        const csrfToken = /*[[${_csrf.token}]]*/ '';
        const csrfHeader = /*[[${_csrf.headerName}]]*/ '';
    </script>
    <script type="text/javascript" th:src="@{/js/likes.js}"></script>

    <script type="text/javascript" th:src="@{/js/dashboard.js}"></script>

</body>

</html>
